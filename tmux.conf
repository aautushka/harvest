# harvest tmux binding. /Users/anton/proj/harvest/target/release/harvest is substituted by install.sh with the absolute binary path.

bind-key f run-shell 'selected=$(tmux capture-pane -p -t "#{pane_id}" -S -10000 | /Users/anton/proj/harvest/target/release/harvest --cwd "#{pane_current_path}" --prompt "$(cat "${XDG_CACHE_HOME:-$HOME/.cache}/harvest/prompt" 2>/dev/null)" | fzf-tmux -p --reverse) && tmux send-keys -t "#{pane_id}" "${selected// /\\ }" || true'
