# harvest tmux binding. /Users/anton/proj/scrollback/target/release/harvest is substituted by install.sh with the absolute binary path.

bind-key f run-shell 'selected=$(tmux capture-pane -p -t "#{pane_id}" -S -10000 | /Users/anton/proj/scrollback/target/release/harvest | fzf-tmux -p --reverse) && [ -n "$selected" ] && tmux send-keys -t "#{pane_id}" "$selected"'
